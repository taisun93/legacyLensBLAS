# Render Blueprint — https://render.com/docs/blueprint-spec
# If legacylens/ is a subdir of your repo, set rootDir. If repo root IS legacylens, remove it.
services:
  - type: web
    name: legacylens
    runtime: python
    region: oregon
    # rootDir: legacylens

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: VOYAGE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

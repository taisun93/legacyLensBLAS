# Render Blueprint — https://render.com/docs/blueprint-spec
# If legacylens/ is a subdir of your repo, set rootDir. If repo root IS legacylens, remove it.
services:
  - type: web
    name: legacylens
    runtime: python
    region: oregon
    # rootDir: legacylens

    buildCommand: pip install -r requirements.txt && chmod +x start.sh
    startCommand: ./start.sh

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: VOYAGE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
